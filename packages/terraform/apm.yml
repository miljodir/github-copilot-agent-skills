name: terraform-deployer-skills
version: 1.0.0
description: >
  Terraform provider upgrades, IaC deployment, and GitHub Agentic Workflow
  skills and agents for GitHub Copilot.
author: miljodir
license: MIT
target: vscode

dependencies:
  apm:
    # Agents
    - miljodir/github-copilot-agent-skills/.github/agents/terraform-provider-upgrade.agent.md
    - miljodir/github-copilot-agent-skills/.github/agents/terraform-change-manager.agent.md
    - miljodir/github-copilot-agent-skills/.github/agents/gh-aw-builder.agent.md
    # Skills
    - miljodir/github-copilot-agent-skills/.github/skills/terraform-provider-upgrade
    - miljodir/github-copilot-agent-skills/.github/skills/gh-aw-operations
  mcp:
    # Requires Docker to be running
    - name: terraform
      registry: false
      transport: stdio
      command: docker
      args:
        - run
        - -i
        - --rm
        - -e
        - TFE_TOKEN
        - -e
        - TFE_ADDRESS
        - hashicorp/terraform-mcp-server:0.3.3
      env:
        TFE_TOKEN: "${input:tfe_token}"
        TFE_ADDRESS: "${input:tfe_address}"
